<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness Squares 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>March Madness Squares</h1>
            <p class="year">2026</p>
        </header>

        <div class="legend">
            <span class="legend-item"><span class="dot pink"></span>Round of 32</span>
            <span class="legend-item"><span class="dot blue"></span>Sweet 16</span>
            <span class="legend-item"><span class="dot green"></span>Elite 8</span>
            <span class="legend-item"><span class="dot purple"></span>Final 4</span>
            <span class="legend-item"><span class="dot red"></span>Finals</span>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <footer>
            <p>Powered by <strong>Saw Mill Studios</strong></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
